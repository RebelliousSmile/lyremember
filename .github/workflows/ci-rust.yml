name: CI Rust

on:
  push:
    branches: [main]
    paths:
      - 'rust-backend/**'
      - '.github/workflows/ci-rust.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust-backend/**'
      - '.github/workflows/ci-rust.yml'

defaults:
  run:
    working-directory: rust-backend

jobs:
  check:
    name: Rust Check & Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-backend

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libsqlite3-dev

      - name: Cargo check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings
