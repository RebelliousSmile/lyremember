name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lyremember-app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lyremember-app/src-tauri

      - name: Install frontend dependencies
        working-directory: lyremember-app
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Initialize Tauri Android
        working-directory: lyremember-app
        run: npx tauri android init

      - name: Build Android APK (debug)
        working-directory: lyremember-app
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk --debug

      - name: Find and rename APK
        id: find-apk
        run: |
          echo "=== All APKs found ==="
          find lyremember-app/src-tauri/gen/android -name "*.apk" -type f
          echo "======================"
          # Prefer debug APK, fallback to any APK
          APK_PATH=$(find lyremember-app/src-tauri/gen/android -path "*/debug/*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find lyremember-app/src-tauri/gen/android -name "*.apk" -type f | head -1)
          fi
          # Copy with a clean name
          cp "$APK_PATH" LyRemember-${{ github.ref_name }}.apk
          echo "apk_path=LyRemember-${{ github.ref_name }}.apk" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Create release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'LyRemember ${{ github.ref_name }}'
          body: |
            ## LyRemember ${{ github.ref_name }}

            ### Android
            - **`.apk`** — Install directly on your device

            ### Installation depuis Termux
            `termux-open` ne peut pas ouvrir les APK depuis le stockage prive de Termux.
            Utilisez le script d'installation fourni :
            ```bash
            # Telecharger l'APK
            curl -LO https://github.com/RebelliousSmile/lyremember/releases/download/${{ github.ref_name }}/LyRemember-${{ github.ref_name }}.apk

            # Installer via le script (copie dans Downloads + ouvre l'installateur)
            bash <(curl -s https://raw.githubusercontent.com/RebelliousSmile/lyremember/main/scripts/termux-install.sh) LyRemember-${{ github.ref_name }}.apk
            ```
            Ou manuellement :
            ```bash
            termux-setup-storage
            cp LyRemember-${{ github.ref_name }}.apk ~/storage/downloads/
            termux-open --content-type application/vnd.android.package-archive ~/storage/downloads/LyRemember-${{ github.ref_name }}.apk
            ```

            _Desktop builds (Windows, Linux, macOS) coming soon._
          files: ${{ steps.find-apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
