name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # - os: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          # - os: macos-latest
          #   target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lyremember-app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lyremember-app/src-tauri

      - name: Install frontend dependencies
        working-directory: lyremember-app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYO3_PYTHON: python3
        with:
          projectPath: lyremember-app
          tagName: ${{ github.ref_name }}
          releaseName: 'LyRemember ${{ github.ref_name }}'
          releaseBody: |
            ## LyRemember ${{ github.ref_name }}

            Download the installer for your platform below.

            ### Desktop
            - **Windows**: `.msi` installer

            ### Mobile
            - **Android**: `.apk` (direct install)

            _Linux and macOS builds coming soon._
          releaseDraft: false
          prerelease: false

  build-android:
    name: Android
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lyremember-app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lyremember-app/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Install frontend dependencies
        working-directory: lyremember-app
        run: npm ci

      - name: Initialize Tauri Android
        working-directory: lyremember-app
        run: npx tauri android init

      - name: Build Android APK
        working-directory: lyremember-app
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          PYO3_PYTHON: python3
          PYO3_CROSS_PYTHON_VERSION: '3.11'

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find lyremember-app/src-tauri/gen/android -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.find-apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
