name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lyremember-app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lyremember-app/src-tauri

      - name: Install frontend dependencies
        working-directory: lyremember-app
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Initialize Tauri Android
        working-directory: lyremember-app
        run: npx tauri android init

      - name: Build Android APK (debug)
        working-directory: lyremember-app
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk --debug

      - name: Find and rename APK
        id: find-apk
        run: |
          echo "=== All APKs found ==="
          find lyremember-app/src-tauri/gen/android -name "*.apk" -type f
          echo "======================"
          APK_PATH=$(find lyremember-app/src-tauri/gen/android -path "*/debug/*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find lyremember-app/src-tauri/gen/android -name "*.apk" -type f | head -1)
          fi
          CLEAN_NAME="LyRemember-${{ github.ref_name }}.apk"
          mv "$APK_PATH" "$CLEAN_NAME"
          echo "apk_name=$CLEAN_NAME" >> "$GITHUB_OUTPUT"
          echo "Renamed $APK_PATH -> $CLEAN_NAME"

      - name: Create release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'LyRemember ${{ github.ref_name }}'
          body: |
            ## LyRemember ${{ github.ref_name }}

            ### Android
            - **`.apk`** — Install directly on your device

            ### Installation depuis Termux
            `termux-open` ne peut pas ouvrir les APK directement.
            ```bash
            termux-setup-storage
            curl -LO https://github.com/RebelliousSmile/lyremember/releases/download/${{ github.ref_name }}/LyRemember-${{ github.ref_name }}.apk
            cp LyRemember-${{ github.ref_name }}.apk ~/storage/downloads/
            termux-open --content-type application/vnd.android.package-archive ~/storage/downloads/LyRemember-${{ github.ref_name }}.apk
            ```

            _Desktop builds (Windows, Linux, macOS) coming soon._
          files: ${{ steps.find-apk.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
