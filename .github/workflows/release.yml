name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lyremember-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lyremember-app/src-tauri

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsqlite3-dev \
            python3-dev

      # macOS dependencies
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install python@3.11

      - name: Install frontend dependencies
        working-directory: lyremember-app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: lyremember-app
          tagName: ${{ github.ref_name }}
          releaseName: 'LyRemember ${{ github.ref_name }}'
          releaseBody: |
            ## LyRemember ${{ github.ref_name }}

            Download the installer for your platform below.

            ### Installation
            - **Linux**: `.deb` (Debian/Ubuntu) or `.AppImage` (any distro)
            - **Windows**: `.msi` installer
            - **macOS**: `.dmg` disk image
          releaseDraft: false
          prerelease: false
