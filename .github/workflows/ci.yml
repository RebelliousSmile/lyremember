name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  rust-backend:
    name: Rust Backend (test + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        working-directory: rust-backend
        run: cargo test

      - name: Check clippy
        working-directory: rust-backend
        run: cargo clippy -- -D warnings

  frontend:
    name: Frontend (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lyremember-app/package-lock.json

      - name: Install dependencies
        working-directory: lyremember-app
        run: npm ci

      - name: Typecheck
        working-directory: lyremember-app
        run: npx vue-tsc --noEmit

      - name: Run tests
        working-directory: lyremember-app
        run: npx vitest run --passWithNoTests
