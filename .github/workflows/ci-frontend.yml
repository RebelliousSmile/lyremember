name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - 'lyremember-app/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lyremember-app/**'
      - '.github/workflows/ci-frontend.yml'

defaults:
  run:
    working-directory: lyremember-app

jobs:
  typecheck-and-build:
    name: TypeScript & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lyremember-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npx vite build
